name: Build and Push Multi-Arch Docker Image

on:
  push:
    branches:
      - main  # 当你向 main 分支推送代码时触发构建
  workflow_dispatch: # 允许你在 GitHub 页面上点击按钮手动触发构建

permissions:
  contents: read
  packages: write  # 授权写入 GitHub Container Registry (GHCR)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3  # 用于跨平台虚拟化编译（支持 arm64）

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64 # 同时构建并打包 x86 与 ARM64 双架构
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/singbox-subscriber:latest
