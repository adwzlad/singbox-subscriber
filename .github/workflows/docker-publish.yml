name: Build and Push Multi-Arch Docker Image

on:
  push:
    branches:
      - main  # 当你向 main 分支推送代码时触发构建
  workflow_dispatch: # 允许手动点击按钮触发构建

permissions:
  contents: read
  packages: write  # 授权写入 GitHub 容器注册表 (GHCR)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3  # 跨平台虚拟化支持

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64 # 同时编译 x86 和 ARM64 镜像
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/singbox-subscriber:latest
